<%#
    Hermes Agent Dashboard - 仪表盘页面
    LuCI template (DTL)
-%>
<%+header%>

<div class="hermes-app" id="hermes-dashboard">
    <div class="cbi-section">
        <h2><%:Hermes Agent 仪表盘%></h2>
        <p><%:查看 Hermes Agent 运行状态、活跃会话和关键指标。%></p>
    </div>

    <!-- 状态概览卡片 -->
    <div class="hermes-grid" id="hermes-status-cards">
        <div class="hermes-card loading" id="card-status">
            <div class="hermes-card-header"><%:连接状态%></div>
            <div class="hermes-card-body">
                <span class="hermes-status-dot hermes-status-unknown"></span>
                <span class="hermes-status-text"><%:检测中...%></span>
            </div>
        </div>
        <div class="hermes-card loading" id="card-version">
            <div class="hermes-card-header"><%:版本%></div>
            <div class="hermes-card-body">--</div>
        </div>
        <div class="hermes-card loading" id="card-sessions">
            <div class="hermes-card-header"><%:活跃会话%></div>
            <div class="hermes-card-body">--</div>
        </div>
        <div class="hermes-card loading" id="card-uptime">
            <div class="hermes-card-header"><%:响应时间%></div>
            <div class="hermes-card-body">--</div>
        </div>
    </div>

    <!-- 快捷操作 -->
    <div class="cbi-section" style="margin-top:20px;">
        <h3><%:快捷操作%></h3>
        <div class="hermes-actions">
            <a href="<%=url('admin/services/hermes/chat')%>" class="cbi-button cbi-button-apply" style="margin-right:8px;">
                <span class="hermes-icon">💬</span> <%:打开聊天%>
            </a>
            <a href="<%=url('admin/services/hermes/config')%>" class="cbi-button cbi-button-apply" style="margin-right:8px;">
                <span class="hermes-icon">⚙️</span> <%:设置%>
            </a>
            <button class="cbi-button cbi-button-reset" onclick="hermesRefreshStatus()">
                <span class="hermes-icon">🔄</span> <%:刷新%>
            </button>
        </div>
    </div>

    <!-- 最近会话列表 -->
    <div class="cbi-section" style="margin-top:20px;">
        <h3><%:最近会话%></h3>
        <div id="hermes-session-list">
            <div class="hermes-table-placeholder"><%:正在加载会话列表...%></div>
        </div>
    </div>
</div>

<%+footer%>

<script type="text/javascript" src="<%=resource%>/hermes/hermes.js"></script>
<script type="text/javascript">
//<![CDATA[
    var hermesServerHost = '<%=luci.model.uci.cursor():get("hermes", "config", "server_host") or "192.168.1.100"%>';
    var hermesServerPort = '<%=luci.model.uci.cursor():get("hermes", "config", "server_port") or "9120"%>';
    var hermesApiKey = '<%=luci.model.uci.cursor():get("hermes", "config", "api_key") or ""%>';
    var refreshInterval = parseInt('<%=luci.model.uci.cursor():get("hermes", "config", "refresh_interval") or "10"%>', 10);

    // 页面加载时获取状态
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(hermesRefreshStatus, 500);
        // 自动刷新
        if (refreshInterval > 0) {
            setInterval(hermesRefreshStatus, refreshInterval * 1000);
        }
    });
//]]>
</script>
